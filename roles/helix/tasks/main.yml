- name: Install Helix editor via devbox global
  command: devbox global add helix@latest
  register: helix_add
  changed_when: "'already' not in helix_add.stderr"

- name: Create Helix config folder if it doesn't exist
  shell: "mkdir -p {{ config }}/helix/"

- name: Check if config exists
  stat: path="{{ config }}/helix"
  register: helix_config_stat

- name: Back up config
  command: "mv {{ config }}/helix {{ config }}/helix_old"
  args:
    creates: "{{ config }}/helix_old"
  when: helix_config_stat.stat.exists

- name: Make sure config is up to date
  file:
    src: "{{ dotfiles_home }}/roles/helix/files/"
    dest: "{{ config }}/helix"
    state: link
    force: yes
- name: Record role in lockfile
  command: "{{ playbook_dir }}/bin/lock-role {{ ansible_role_name }}"
  changed_when: false
