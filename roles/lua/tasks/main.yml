- name: Add lua 5.5 to devbox global
  # SbarLua bundles Lua 5.5 and the .so it builds is ABI-locked to that
  # version. The plain `lua` package on devbox is 5.2 which would silently
  # crash sketchybar on require('sketchybar'). Use the 5.5 package instead.
  command: devbox global add lua55Packages.lua@latest
  register: lua_add
  changed_when: "'already' not in lua_add.stderr"

- name: Verify lua is available
  shell: |
    eval "$(devbox global shellenv)"
    lua -v
  register: lua_version
  changed_when: false

- name: Display lua version
  debug:
    msg: "lua {{ lua_version.stdout }} is installed via devbox global"

- name: Record role in lockfile
  command: "{{ playbook_dir }}/bin/lock-role {{ ansible_role_name }}"
  changed_when: false
