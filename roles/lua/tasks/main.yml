- name: Add lua to devbox global
  command: devbox global add lua@latest
  register: lua_add
  changed_when: "'already' not in lua_add.stderr"

- name: Verify lua is available
  shell: |
    eval "$(devbox global shellenv)"
    lua -v
  register: lua_version
  changed_when: false

- name: Display lua version
  debug:
    msg: "lua {{ lua_version.stdout }} is installed via devbox global"

- name: Record role in lockfile
  command: "{{ playbook_dir }}/bin/lock-role {{ ansible_role_name }}"
  changed_when: false
