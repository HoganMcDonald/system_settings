- name: Install zsh
  homebrew:
    name: zsh

# zinit
- name: Check for zinit installation
  stat:
    path: "{{ dotfiles_user_home }}/.local/share/zinit/zinit.git"
  register: zinit_stat

- name: Install zinit
  git:
    repo: https://github.com/zdharma-continuum/zinit.git
    dest: "{{ dotfiles_user_home }}/.local/share/zinit/zinit.git"
  when: not zinit_stat.stat.exists

# ZSH Configuration
- name: Create config directory if it doesn't exist
  file:
    path: "{{ dotfiles_user_home }}/.config/zsh"
    state: directory
    mode: '0755'

- name: Symlink ZSH config files
  file:
    src: "{{ dotfiles_home }}/roles/zsh/files/"
    dest: "{{ dotfiles_user_home }}/.config/zsh"
    state: link
    force: yes

# ZSHRC
- name: Check for .zshrc
  stat: path="{{dotfiles_user_home}}/.zshrc"
  register: zshrc_stat
- name: Back up .zshrc
  command: mv ~/.zshrc ~/.zshrc.bak
  args:
    creates: "{{dotfiles_user_home}}/.zshrc.bak"
  when: zshrc_stat.stat.exists
- name: Link .zshrc
  file:
    src: "{{ dotfiles_user_home }}/.config/zsh/zshrc"
    dest: "{{dotfiles_user_home}}/.zshrc"
    state: link
    force: yes
- name: Create hushlogin file
  file:
    src: "{{ dotfiles_user_home }}/.config/zsh/hushlogin"
    dest: "{{ dotfiles_user_home }}/.hushlogin"
    state: link
    force: yes

# prompt
- name: Install Starship prompt via devbox global
  command: devbox global add starship@latest
  register: starship_add
  changed_when: "'already' not in starship_add.stderr"

- name: Record role in lockfile
  command: "{{ playbook_dir }}/bin/lock-role {{ ansible_role_name }}"
  changed_when: false
