- name: "Wallpaper - set desktop picture on all spaces"
  command:
    argv:
      - osascript
      - -e
      - tell application "System Events" to set picture of every desktop to POSIX file "{{ macos_wallpaper_path }}"
  vars:
    macos_wallpaper_path: "{{ DesktopScreenSaver_BackGroundImage | default(role_path ~ '/files/wallpaper.jpg') }}"
  changed_when: false
