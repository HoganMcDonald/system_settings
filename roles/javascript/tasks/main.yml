- name: Add nodejs to devbox global
  command: devbox global add nodejs@latest
  register: node_add
  changed_when: "'already' not in node_add.stderr"

- name: Verify node is available
  shell: |
    eval "$(devbox global shellenv)"
    node --version
  register: node_version
  changed_when: false

- name: Display node version
  debug:
    msg: "node {{ node_version.stdout }} is installed via devbox global"

- name: Record role in lockfile
  command: "{{ playbook_dir }}/bin/lock-role {{ ansible_role_name }}"
  changed_when: false
