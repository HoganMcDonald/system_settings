- name: Install asdf
  homebrew:
    name: asdf
    state: present

- name: Verify asdf is available
  command: asdf --version
  register: asdf_version
  changed_when: false

- name: Display asdf version
  debug:
    msg: "asdf {{ asdf_version.stdout }} is installed and available"

- name: Set asdf shims in Ansible PATH
  set_fact:
    dotfiles_ansible_path: "{{ ansible_facts.env.HOME }}/.asdf/shims:{{ dotfiles_ansible_path | default(ansible_facts.env.PATH) }}"

- name: Record role in lockfile
  command: "{{ playbook_dir }}/bin/lock-role {{ ansible_role_name }}"
  changed_when: false
