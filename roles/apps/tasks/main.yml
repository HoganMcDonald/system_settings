- name: Install GUI applications
  community.general.homebrew_cask:
    name: "{{ item }}"
    state: present
    install_options: "adopt"
    sudo_password: "{{ ansible_become_pass | default(omit) }}"
  loop: "{{ apps }}"

- name: Record role in lockfile
  command: "{{ playbook_dir }}/bin/lock-role {{ ansible_role_name }}"
  changed_when: false
