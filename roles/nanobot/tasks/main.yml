---
- name: Load vault secrets
  ansible.builtin.include_vars:
    file: "{{ dotfiles_home }}/vault/secrets.yml"

- name: Install uv
  homebrew:
    name: uv
    state: present

- name: Install nanobot-ai via uv
  command: uv tool install nanobot-ai
  register: nanobot_install
  changed_when: "'Installed' in nanobot_install.stdout"
  failed_when: nanobot_install.rc != 0 and "already installed" not in nanobot_install.stderr

- name: Create nanobot config dir
  file:
    path: "{{ nanobot_config_dir }}"
    state: directory

- name: Render nanobot config
  template:
    src: config.json.j2
    dest: "{{ nanobot_config_dir }}/config.json"

- name: Create agent workspace directory
  file:
    path: "{{ agent_workspace_dir }}"
    state: directory

- name: Check if skills is a real directory
  stat:
    path: "{{ nanobot_config_dir }}/workspace/skills"
  register: skills_stat

- name: Remove existing skills directory if not a symlink
  file:
    path: "{{ nanobot_config_dir }}/workspace/skills"
    state: absent
  when: skills_stat.stat.exists and not skills_stat.stat.islnk

- name: Symlink nanobot workspace skills
  file:
    src: "{{ dotfiles_home }}/roles/nanobot/files/workspace/skills"
    dest: "{{ nanobot_config_dir }}/workspace/skills"
    state: link
    force: yes

- name: Ensure nanobot scripts are executable
  file:
    path: "{{ playbook_dir }}/bin/{{ item }}"
    mode: "0755"
  loop:
    - nanobot-start
    - nanobot-stop

- name: Record role in lockfile
  command: "{{ playbook_dir }}/bin/lock-role {{ ansible_role_name }}"
  changed_when: false
