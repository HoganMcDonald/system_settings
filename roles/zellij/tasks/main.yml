- name: Install zellij
  homebrew:
    name: zellij

# zellij config
- name: Make sure config is up to date
  file:
    src: "{{ dotfiles_home }}/roles/zellij/files/"
    dest: "{{ config }}/zellij"
    state: link
    force: yes

- name: Record role in lockfile
  command: "{{ playbook_dir }}/bin/lock-role {{ ansible_role_name }}"
  changed_when: false
