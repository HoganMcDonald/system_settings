- name: Install zellij via devbox global
  command: devbox global add zellij@latest
  register: zellij_add
  changed_when: "'already' not in zellij_add.stderr"

# zellij config
- name: Make sure config is up to date
  file:
    src: "{{ dotfiles_home }}/roles/zellij/files/"
    dest: "{{ config }}/zellij"
    state: link
    force: yes

- name: Record role in lockfile
  command: "{{ playbook_dir }}/bin/lock-role {{ ansible_role_name }}"
  changed_when: false
