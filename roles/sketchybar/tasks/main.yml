- name: Load vault secrets
  ansible.builtin.include_vars:
    file: "{{ dotfiles_home }}/vault/secrets.yml"

- name: Prepare to install sketchybar
  homebrew_tap:
    name: FelixKratz/formulae

- name: Install SF-Symbols
  community.general.homebrew_cask:
    name: sf-symbols
    state: present
    sudo_password: "{{ become_password }}"

- name: Install sketchybar
  homebrew:
    name: sketchybar

- name: Stat installed SbarLua module
  ansible.builtin.stat:
    path: "{{ ansible_env.HOME }}/.local/share/sketchybar_lua/sketchybar.so"
  register: sbarlua_stat

- name: Stat devbox lua binary
  ansible.builtin.stat:
    path: "{{ ansible_env.HOME }}/.local/share/devbox/global/default/.devbox/nix/profile/default/bin/lua"
  register: devbox_lua_stat

- name: Install SbarLua from source
  # Rebuild if the .so is missing OR older than the current lua binary
  # (e.g. after a version-manager swap that changes the lua ABI).
  shell: |
    set -e
    rm -rf /tmp/SbarLua
    git clone https://github.com/FelixKratz/SbarLua.git /tmp/SbarLua
    cd /tmp/SbarLua/
    make install
    rm -rf /tmp/SbarLua/
  when: >
    not sbarlua_stat.stat.exists
    or (devbox_lua_stat.stat.exists
        and devbox_lua_stat.stat.mtime > sbarlua_stat.stat.mtime)

- name: Check if config exists
  stat: path="{{ config }}/sketchybar"
  register: sketchybar_config_stat

- name: Back up config
  command: "mv {{ config }}/sketchybar {{ config }}/sketchybar_old"
  args:
    creates: "{{ config }}/sketchybar_old"
  when: sketchybar_config_stat.stat.exists

- name: Make sure config is up to date
  file:
    src: "{{ dotfiles_home }}/roles/sketchybar/files/"
    dest: "{{ config }}/sketchybar"
    state: link
    force: yes

- name: Ensure LaunchAgents directory exists
  file:
    path: "{{ ansible_env.HOME }}/Library/LaunchAgents"
    state: directory
    mode: '0755'

- name: Disengage brew services from sketchybar
  # We manage the launchd plist ourselves under a non-homebrew Label so brew
  # services can't recognize or clobber it. Run this regardless of whether
  # the plist task changed — `brew services stop` is idempotent.
  command: brew services stop sketchybar
  failed_when: false
  changed_when: false

- name: Remove legacy homebrew-labeled plist if present
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/Library/LaunchAgents/homebrew.mxcl.sketchybar.plist"
    state: absent

- name: Bootout legacy launchd service if loaded
  command: launchctl bootout "gui/{{ ansible_env.UID | default(lookup('env', 'UID')) }}/homebrew.mxcl.sketchybar"
  failed_when: false
  changed_when: false

- name: Deploy custom plist with correct PATH
  template:
    src: local.sketchybar.plist.j2
    dest: "{{ ansible_env.HOME }}/Library/LaunchAgents/local.sketchybar.plist"
    mode: '0644'
  register: plist_deployed

- name: Bootout existing local.sketchybar service if running
  command: launchctl bootout "gui/{{ ansible_env.UID | default(lookup('env', 'UID')) }}/local.sketchybar"
  when: plist_deployed.changed
  failed_when: false

- name: Bootstrap sketchybar service
  command: launchctl bootstrap "gui/{{ ansible_env.UID | default(lookup('env', 'UID')) }}" "{{ ansible_env.HOME }}/Library/LaunchAgents/local.sketchybar.plist"
  when: plist_deployed.changed

- name: Record role in lockfile
  command: "{{ playbook_dir }}/bin/lock-role {{ ansible_role_name }}"
  changed_when: false
