- name: Install Claude Code CLI
  homebrew_cask:
    name: claude-code

- name: Resolve npm path via asdf
  shell: |
    version=$(ls ~/.asdf/installs/nodejs/ | sort -V | tail -1)
    ASDF_NODEJS_VERSION=$version ~/.asdf/installs/nodejs/$version/bin/npm install -g @openai/codex
  register: codex_install
  changed_when: "'added' in codex_install.stdout"

- name: Check if Claude config exists
  stat: path="{{ claude_config_dir }}"
  register: claude_config_stat

- name: Back up Claude config
  command: "mv {{ claude_config_dir }} {{ claude_config_dir }}_old"
  args:
    creates: "{{ claude_config_dir }}_old"
  when: claude_config_stat.stat.exists

- name: Symlink Claude config
  file:
    src: "{{ dotfiles_home }}/roles/agents/files/claude"
    dest: "{{ claude_config_dir }}"
    state: link
    force: yes

- name: Check if Codex config exists
  stat: path="{{ codex_config_dir }}"
  register: codex_config_stat

- name: Back up Codex config
  command: "mv {{ codex_config_dir }} {{ codex_config_dir }}_old"
  args:
    creates: "{{ codex_config_dir }}_old"
  when: codex_config_stat.stat.exists

- name: Symlink Codex config
  file:
    src: "{{ dotfiles_home }}/roles/agents/files/codex"
    dest: "{{ codex_config_dir }}"
    state: link
    force: yes

- name: Tap anomalyco/tap for opencode
  homebrew_tap:
    name: anomalyco/tap
    state: present

- name: Install opencode
  homebrew:
    name: anomalyco/tap/opencode
    state: present

- name: Check if opencode config exists
  stat: path="{{ opencode_config_dir }}"
  register: opencode_config_stat

- name: Back up opencode config
  command: "mv {{ opencode_config_dir }} {{ opencode_config_dir }}_old"
  args:
    creates: "{{ opencode_config_dir }}_old"
  when: opencode_config_stat.stat.exists

- name: Symlink opencode config
  file:
    src: "{{ dotfiles_home }}/roles/agents/files/opencode"
    dest: "{{ opencode_config_dir }}"
    state: link
    force: yes

- name: Record role in lockfile
  command: "{{ playbook_dir }}/bin/lock-role {{ ansible_role_name }}"
  changed_when: false
