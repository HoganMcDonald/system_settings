# ====================
#   TPM Plugin Manager
# ====================

# Auto-install TPM if missing
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm'"

set -g @plugin 'tmux-plugins/tpm'

# Session save/restore
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-save-interval '5'
set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

# Minimalist dotted status bar
set -g @plugin 'vaaleyard/tmux-dotbar'

# Raycast-style command palette — bound to `prefix + Space` below
set -g @plugin 'eduwass/tmux-palette'
set -g @palette-key 'off'
bind Space run-shell "~/.tmux/plugins/tmux-palette/bin/tmux-palette.sh"

# Auto-install any declared plugins that aren't present
run-shell -b '~/.tmux/plugins/tpm/bin/install_plugins'

# Initialize TMUX plugin manager (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
