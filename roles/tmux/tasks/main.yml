- name: Install tmux tools via devbox global
  command: "devbox global add {{ item }}"
  loop:
    - tmux@latest
    - tmuxinator@latest
  register: tmux_install
  changed_when: "'already' not in tmux_install.stderr"

# tmux-palette commands.json
- name: tmux-palette - ensure config dir exists
  file:
    path: "{{ config }}/tmux-palette"
    state: directory

- name: tmux-palette - link commands.static.json
  file:
    src: "{{ dotfiles_home }}/roles/tmux/files/tmux-palette/commands.static.json"
    dest: "{{ config }}/tmux-palette/commands.static.json"
    state: link
    force: yes

- name: tmux-palette - seed commands.json from regen
  command: palette-sessions-regen
  changed_when: false

- name: tmux-palette - link theme.json
  file:
    src: "{{ dotfiles_home }}/roles/tmux/files/tmux-palette/theme.json"
    dest: "{{ config }}/tmux-palette/theme.json"
    state: link
    force: yes

- name: tmux-palette - ensure themes dir exists
  file:
    path: "{{ config }}/tmux-palette/themes"
    state: directory

- name: tmux-palette - link cyberdream theme
  file:
    src: "{{ dotfiles_home }}/roles/tmux/files/tmux-palette/themes/cyberdream.json"
    dest: "{{ config }}/tmux-palette/themes/cyberdream.json"
    state: link
    force: yes

# tmux config
- name: Install TPM (Tmux Plugin Manager)
  git:
    repo: https://github.com/tmux-plugins/tpm
    dest: ~/.tmux/plugins/tpm
    depth: 1

- name: tmux - link config file
  file:
    src: "{{ dotfiles_home }}/roles/tmux/files/tmux.conf"
    dest: "~/.tmux.conf"
    state: link
    force: yes

- name: Tmux - Check if config exists
  stat: path="{{ config }}/tmux"
  register: tmux_config_stat

- name: Tmux - Back up config
  command: "mv {{ config }}/tmux {{ config }}/tmux_old"
  args:
    creates: "{{ config }}/tmux_old"
  when: tmux_config_stat.stat.exists

- name: Tmux - Make sure config is up to date
  file:
    src: "{{ dotfiles_home }}/roles/tmux/files/tmux/"
    dest: "{{ config }}/tmux"
    state: link
    force: yes

# tmuxinator config
- name: Tmuxinator - Check if config exists
  stat: path="{{ config }}/tmuxinator"
  register: tmuxinator_config_stat

- name: Tmuxinator - Back up config
  command: "mv {{ config }}/tmuxinator {{ config }}/tmuxinator_old"
  args:
    creates: "{{ config }}/tmuxinator_old"
  when: tmuxinator_config_stat.stat.exists

- name: Tmuxinator - Make sure config is up to date
  file:
    src: "{{ dotfiles_home }}/roles/tmux/files/tmuxinator/"
    dest: "{{ config }}/tmuxinator"
    state: link
    force: yes

- name: Record role in lockfile
  command: "{{ playbook_dir }}/bin/lock-role {{ ansible_role_name }}"
  changed_when: false
