- name: Add neovim to devbox global
  command: devbox global add neovim@latest
  register: nvim_add
  changed_when: "'already' not in nvim_add.stderr"

- name: Verify neovim is available
  shell: |
    eval "$(devbox global shellenv)"
    nvim --version | head -1
  register: nvim_version
  changed_when: false

- name: Display neovim version
  debug:
    msg: "{{ nvim_version.stdout }} is installed via devbox global"

- name: Make sure config is up to date
  file:
    src: "{{ dotfiles_home }}/roles/neovim/files/"
    dest: "{{ config }}/nvim"
    state: link
    force: yes

- name: Decrypt neovim environment variables
  ansible.builtin.include_vars:
    file: "{{ dotfiles_home }}/vault/secrets.yml"
    name: env_vars
  no_log: false # Avoid logging sensitive information

- name: Create Neovim .env file with secure tokens
  ansible.builtin.template:
    src: neovim_env_template.j2
    dest: "{{ config }}/nvim/.env"
    mode: "0600" # Ensure only the user has access to the .env file

- name: Record role in lockfile
  command: "{{ playbook_dir }}/bin/lock-role {{ ansible_role_name }}"
  changed_when: false
