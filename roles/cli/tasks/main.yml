- name: Install CLI tools via devbox global
  command: "devbox global add {{ item }}"
  loop: "{{ devbox_tools }}"
  register: devbox_install
  changed_when: "'already' not in devbox_install.stderr"

- name: Install CLI tools via Homebrew
  homebrew:
    name: "{{ item }}"
  loop: "{{ homebrew_tools }}"

- name: Tap homebrew fonts
  homebrew_tap:
    name: homebrew/dupes
    state: absent

- name: Install font
  homebrew_cask:
    name: font-hack-nerd-font

- name: Record role in lockfile
  command: "{{ playbook_dir }}/bin/lock-role {{ ansible_role_name }}"
  changed_when: false
