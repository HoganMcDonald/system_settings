- name: Add ruby to devbox global
  command: devbox global add ruby@latest
  register: ruby_add
  changed_when: "'already' not in ruby_add.stderr"

- name: Verify ruby is available
  shell: |
    eval "$(devbox global shellenv)"
    ruby --version
  register: ruby_version
  changed_when: false

- name: Display ruby version
  debug:
    msg: "ruby {{ ruby_version.stdout }} is installed via devbox global"

- name: Record role in lockfile
  command: "{{ playbook_dir }}/bin/lock-role {{ ansible_role_name }}"
  changed_when: false
